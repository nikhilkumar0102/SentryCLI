# =============================================================================
# SentryCLI - API Key Configuration
# config/api_keys.conf
#
# SECURITY NOTE:
#   • Set file permissions: chmod 600 config/api_keys.conf
#   • Never commit this file to version control
#   • Add config/api_keys.conf to your .gitignore
# =============================================================================

# ── AbuseIPDB ─────────────────────────────────────────────────────────────────
# Sign up at: https://www.abuseipdb.com/register
# Free tier: 1,000 checks/day
ABUSEIPDB_API_KEY=""

# ── VirusTotal ────────────────────────────────────────────────────────────────
# Sign up at: https://www.virustotal.com/gui/join-us
# Free tier: 4 lookups/min, 500/day
VIRUSTOTAL_API_KEY=""

# ── Shodan (optional) ────────────────────────────────────────────────────────
# Sign up at: https://account.shodan.io/register
SHODAN_API_KEY=""

# ── General Settings ─────────────────────────────────────────────────────────
# Threat score threshold above which an IP is flagged as malicious (0-100)
ABUSEIPDB_THREAT_THRESHOLD=25

# Maximum IPs to correlate automatically in one session
MAX_CORRELATION_IPS=20

# Request timeout in seconds for API calls
API_TIMEOUT=10
